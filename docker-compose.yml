version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    ports:
      - "8000:8000"
    volumes:
      - ./analytics.json:/app/analytics.json
      # If you want to persist model updates or logs later:
      # - ./models:/app/models
      # - ./logs:/app/logs
    environment:
    - API=http://backend:8000
    - PYTHONUNBUFFERED=1
    - STREAMLIT_SERVER_ENABLE_CORS=false
    # ... other env vars
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s          # give model loading time


  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      streamlit run streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - API=http://backend:8000
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ./analytics.json:/app/analytics.json:ro     # read-only is usually enough for frontend
    restart: unless-stopped


# Optional: if you want to expose both services easily via traefik / nginx / caddy later
